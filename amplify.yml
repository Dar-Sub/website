# AWS Amplify Hosting — static site (build → dist/)
# https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
