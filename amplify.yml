# AWS Amplify Hosting — static site (build → dist/)
# https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # lockfileVersion 3 needs npm 7+ (Node 16+). Amplify default can be older.
        - nvm install 20
        - nvm use 20
        - node -v && npm -v
        # Amplify cache can occasionally desync strict `npm ci`; install is more tolerant.
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
