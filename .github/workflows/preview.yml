# ==============================================
#  PR Preview Pipeline — Auto-preview on PRs
# ==============================================

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run build

      - name: Deploy to Netlify (Preview)
        id: netlify-preview
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: "./dist"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR Preview — ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          alias: pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment Ready!
              
              | Branch | Status | Preview URL |
              |--------|--------|-------------|
              | \`${{ github.head_ref }}\` | ✅ Deployed | [${{ steps.netlify-preview.outputs.deploy-url }}](${{ steps.netlify-preview.outputs.deploy-url }}) |
              
              > This preview will be updated automatically on every new commit to this PR.`
            })
